# Do not put too many request in each sub-sequence as there is no chaining implemented for the PUT DATA ADMIN command

-
  - createVerifierRequest:
      id: !!x "80"  # PIN
      modeContact: always
      modeContactless: always
      minLength: 4
      maxLength: 8
      retriesContact: 3
      retriesContactless: 3
  - createVerifierRequest:
      id: !!x "81"  # PUK
      modeContact: always
      modeContactless: always
      minLength: 8
      maxLength: 8
      retriesContact: 9
      retriesContactless: 9
