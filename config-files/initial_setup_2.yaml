# The setup is split in 3 parts because PUT DATA ADMIN does not support chaining

- createObjectRequest:
    id: !x "5FC10A"  # X509 Certificate for Digital Signature
    modeContact: !accessMode "always"
    modeContactless: !accessMode "always"
    adminKey: !x "9B"
- createObjectRequest:
    id: !x "5FC10B"  # X509 Certificate for Key Management
    modeContact: !accessMode "always"
    modeContactless: !accessMode "always"
    adminKey: !x "9B"
- createObjectRequest:
